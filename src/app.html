<!doctype html>
<html lang="en" %sveltekit.theme%>
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<meta
			name="description"
			content="Dash.fi brand and design system — logos, tokens, components, voice, and partner kits."
		/>
		<title>Dashbook — Dash.fi Brand &amp; Design System</title>
		<script>
			// Suppress flash of incorrect theme: read cookie/localStorage before paint.
			(function () {
				try {
					var stored = localStorage.getItem('dashbook-theme');
					var prefers = window.matchMedia('(prefers-color-scheme: dark)').matches;
					var resolved =
						stored === 'dark' || (stored !== 'light' && prefers) ? 'dark' : 'light';
					document.documentElement.classList.toggle('dark', resolved === 'dark');
					document.documentElement.style.colorScheme = resolved;
				} catch (_) {
					/* no-op */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
